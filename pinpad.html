
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nova+Square&display=swap');
  :root {
    --bg: #050510; --bg2: #0a0a20;
    --green: #1CC74C;
  }
    html, body {
    width:100%; height:100%;
    color: var(--green);
    font-family: Nova Square;
	font-size: 12px;
    overflow: hidden;
    touch-action: none;
  }
  
  .pinpad-wrap {
    display: flex; justify-content: center; align-items: center; padding: 2rem 0;
  }
  .pinpad {
    background: var(--bg2);
	color: var(--green);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 1.25rem 1rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    width: fit-content;
  }
  .key {
    font-family: 'Noto Emoji', sans-serif;
    font-size: 32px;
    background: transparent;
    border: 6px double var(--green);
	border-radius: 12px;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    line-height: 1;
    opacity: 0.85;
  }
  .key:active {
    transform: scale(0.88);
    opacity: 1;
  }
  .entry
    background: transparent;
	color: var(--green);
    border: 1px solid var(--green);
    border-radius: 12px;
    width: 240px; height: 64px;
    display: flex; align-items: center; justify-content: center;
	}
  
</style>
<div class="pinpad-wrap">
  <div class="pinpad">
	ENTER PIN<br>
	<div class="entry">****</div>
    <div class="key">1</div>
    <div class="key">2</div>
    <div class="key">3</div>
    <div class="key">4</div>
    <div class="key">5</div>
    <div class="key">6</div>
    <div class="key">7</div>
    <div class="key">8</div>
    <div class="key">9</div>
    <div class="key">*</div>
    <div class="key">0</div>
    <div class="key">#</div>
  </div>
</div>
