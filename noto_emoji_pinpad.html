
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nova+Square&family=Noto+Emoji&display=swap');
  :root {
    --bg: #050510; --bg2: #0a0a20;
    --cyan: #00f5ff; --purple: #a855f7; --pink: #d42b6a;
  }
  .pinpad-wrap {
    display: flex; justify-content: center; align-items: center; padding: 2rem 0;
  }
  .pinpad {
    background: var(--bg2);
    border: 1px solid var(--purple);
    border-radius: 12px;
    padding: 1.5rem 1.25rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: fit-content;
  }
  .key {
    font-family: 'Noto Emoji', sans-serif;
    font-size: 28px;
    color: var(--cyan);
    background: var(--bg);
    border: 1px solid var(--purple);
    border-radius: 8px;
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.1s, border-color 0.1s, background 0.1s;
    line-height: 1;
  }
  .key:active {
    color: var(--pink);
    border-color: var(--pink);
    background: #1a0a18;
  }
</style>
<div class="pinpad-wrap">
  <div class="pinpad">
    <div class="key">1︎⃣</div>
    <div class="key">2︎⃣</div>
    <div class="key">3︎⃣</div>
    <div class="key">4︎⃣</div>
    <div class="key">5︎⃣</div>
    <div class="key">6︎⃣</div>
    <div class="key">7︎⃣</div>
    <div class="key">8︎⃣</div>
    <div class="key">9︎⃣</div>
    <div class="key">*︎⃣</div>
    <div class="key">0︎⃣</div>
    <div class="key">#︎⃣</div>
  </div>
</div>
